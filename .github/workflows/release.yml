# Release: on a version tag, build and publish the multi-arch container image to
# GHCR (#54). Tagging `vX.Y.Z` on `main` (per the branching convention) produces
# `ghcr.io/imonroe/openhearth:X.Y.Z`, `:X.Y`, and `:latest` (latest only for a
# non-prerelease semver, via metadata-action's default `latest=auto`).
name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write # push to GHCR under the repo owner

jobs:
  publish-image:
    name: Publish container image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU enables the linux/arm64 build (Raspberry Pi-class hosts) via emulation.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/imonroe/openhearth
          # From a `vX.Y.Z` tag: a full `X.Y.Z` tag, a rolling `X.Y` tag, and
          # `:latest` (auto — skipped for prereleases like `v1.0.0-rc.1`).
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push (linux/amd64 + linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
