# E2E fixture config. The server loads this via OPENHEARTH_CONFIG_DIR so the
# Playwright suite runs against a deterministic catalog (not the user's, not the
# shipped community seed). Service tiles point at the local stub service server
# (see e2e/fixtures/stub-service.mjs) so launching touches no real network.
ui:
  title: OpenHearth
  theme: dark
  rows:
    - { type: services, group: Streaming }

server:
  port: 8080
  logLevel: warn

keybindings:
  up: [ArrowUp]
  down: [ArrowDown]
  left: [ArrowLeft]
  right: [ArrowRight]
  select: [Enter]
  back: [Backspace, Escape]
  home: [Home]
  play_pause: [' ']
