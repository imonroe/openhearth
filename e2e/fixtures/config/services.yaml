# E2E service catalog. Tiles launch the local stub service (port 8090) so the
# Home/Back return test exercises a real cross-origin navigation + the kiosk
# home-guard extension, with no external network.
services:
  - id: fakeflix
    name: FakeFlix
    launch_url: http://localhost:8090/
    group: Streaming
    order: 10

  - id: stubtube
    name: StubTube
    launch_url: http://localhost:8090/?service=stubtube
    group: Streaming
    order: 20

  # Extra tiles so the Streaming row overflows the viewport — exercises the
  # horizontal row scrolling (issue #113, home-scroll.spec.ts). They all point
  # at the same stub service; only their count and identity matter here.
  - {
      id: tile03,
      name: Tile03,
      launch_url: 'http://localhost:8090/?s=3',
      group: Streaming,
      order: 30,
    }
