# Reference docker-compose for OpenHearth. See PRD §15.1.
#
# Quick start (build locally from this checkout):
#   docker compose up --build
# then open http://localhost:8080.
#
# `build:` compiles the image from docker/Dockerfile and tags it as `image:`.
# To instead pull the published container, drop the `build:` block and run
# `docker compose up` — it will fetch `ghcr.io/imonroe/openhearth:latest`.
services:
  openhearth:
    image: ghcr.io/imonroe/openhearth:latest
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: openhearth
    # Run the container as your host user so files written to ./config and
    # ./cache are owned by you, not root. Set PUID/PGID in a `.env` file next to
    # this compose file (copy .env.example) — find your values with `id -u` and
    # `id -g`. Defaults to 1000:1000 (the image's built-in `node` user) when
    # unset. /media is read-only, so its ownership only needs to be readable by
    # this user.
    user: '${PUID:-1000}:${PGID:-1000}'
    ports:
      - '8080:8080' # web UI + API + WS
    volumes:
      - ./config:/config # host-mapped YAML (read/write, source of truth)
      - /path/to/media:/media:ro # library source(s), read-only
      - ./cache:/cache # derived index/artwork/transcode cache (disposable)
    environment:
      - TMDB_API_KEY=${TMDB_API_KEY:-} # optional; app is fully usable without it
    # GPU transcoding is opt-in and host-specific — CPU (libx264) is the default
    # and guaranteed path. To enable a backend, map the device here AND set
    # `transcode.hwaccel` in config/openhearth.yaml. Full per-host setup
    # (VAAPI / NVENC / QSV, verification, Windows/WSL2 caveats) is in
    # docs/deployment/gpu-transcoding.md.
    #
    # Linux VAAPI / QSV (Intel/AMD) example:
    # devices:
    #   - /dev/dri:/dev/dri
    # group_add:
    #   - '44'   # host "video" gid
    #   - '105'  # host "render" gid (varies by distro)
    #
    # NVIDIA NVENC (requires the NVIDIA Container Toolkit) example:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - { driver: nvidia, count: 1, capabilities: [gpu, video] }
    restart: unless-stopped
